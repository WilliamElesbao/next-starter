name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

jobs:
  prisma-generate:
    name: Prisma Generate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Upload Prisma generated files
        uses: actions/upload-artifact@v4
        with:
          name: prisma-generated
          path: prisma/generated/
          retention-days: 1

  typecheck:
    name: Typecheck
    needs: prisma-generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Prisma generated files
        uses: actions/download-artifact@v4
        with:
          name: prisma-generated
          path: prisma/generated/

      - name: Typecheck
        run: bun tsc

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun biome ci .

  i18n-audit:
    name: i18n Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate i18n keys
        run: |
          bun run locale-check
          bun run locale-unused

  tests:
    name: Tests
    needs: [prisma-generate, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Prisma generated files
        uses: actions/download-artifact@v4
        with:
          name: prisma-generated
          path: prisma/generated/

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 1

  sonarcloud:
    name: SonarCloud
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for accurate analysis

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build
    needs: [lint, i18n-audit, typecheck, tests, sonarcloud]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      BETTER_AUTH_SECRET: test-secret
      BETTER_AUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: test.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: test
      RESEND_API_KEY: re_test
      EMAIL_FROM: test@test.com
      EMAIL_TO: test@test.com
      STRIPE_API_KEY: sk_test
      STRIPE_WEBHOOK_SECRET: whsec_test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Prisma generated files
        uses: actions/download-artifact@v4
        with:
          name: prisma-generated
          path: prisma/generated/

      - name: Build
        run: bun run build
