kind: pipeline
type: docker
name: CI

platform:
  arch: arm64

clone:
  depth: 100

trigger:
  branch:
    - main
  event:
    - push
    - pull_request
    - tag

steps:
  - name: install
    image: oven/bun:1.3.3
    commands:
      - bun install --ignore-scripts

  - name: prisma-generate
    image: oven/bun:1.3.3
    environment:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    commands:
      - bun run db:generate
    depends_on:
      - install

  - name: typecheck
    image: oven/bun:1.3.3
    commands:
      - bun tsc
    depends_on:
      - install
      - prisma-generate

  - name: lint
    image: oven/bun:1.3.3
    commands:
      - bun biome ci .
    depends_on:
      - install

  - name: i18n-audit
    image: oven/bun:1.3.3
    commands:
      - bun locale-check
      - bun locale-unused
    depends_on:
      - install

  - name: tests
    image: oven/bun:1.3.3
    commands:
      - bun run test
    depends_on:
      - install
      - prisma-generate
      - typecheck

  - name: build
    image: node:24
    environment:
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      BETTER_AUTH_SECRET: test-secret
      BETTER_AUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: test.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: test
      RESEND_API_KEY: re_test
      EMAIL_FROM: test@test.com
      EMAIL_TO: test@test.com
      STRIPE_API_KEY: sk_test
      STRIPE_WEBHOOK_SECRET: whsec_test
    commands:
      - npm run build
    depends_on:
      - install
      - lint
      - i18n-audit
      - typecheck
      - tests
