sonar.projectKey=project-key-next-starter
sonar.organization=org-key-evo

# Sources
sonar.sources=./src

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Temporary: ignore coverage metrics
sonar.coverage.exclusions=**/*

# Coverage report generated by vitest --coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
