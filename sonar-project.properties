sonar.projectKey=next-starter_next-starter
sonar.organization=next-starter

# Sources
sonar.sources=./src

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Coverage report generated by vitest --coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
