sonar.projectKey=next-starter_next-starter
sonar.organization=next-starter

# Sources
sonar.sources=./src

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Temporary: ignore coverage metric until coverage pipeline is re-enabled
sonar.coverage.exclusions=**/*